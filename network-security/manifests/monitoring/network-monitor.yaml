apiVersion: v1
kind: Pod
metadata:
  name: network-monitor
  namespace: monitoring
  labels:
    app: network-monitor
spec:
  hostNetwork: true
  containers:
  - name: monitor
    image: nicolaka/netshoot
    command: ["/bin/sh"]
    args: ["-c", "sleep 3600"]
    securityContext:
      privileged: true
      capabilities:
        add: ["NET_ADMIN", "NET_RAW"]
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
  nodeSelector:
    kubernetes.io/os: linux
