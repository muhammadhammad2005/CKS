apiVersion: v1
kind: Pod
metadata:
  name: secret-volume-pod
spec:
  containers:
  - name: myapp
    image: nginx:1.21
    volumeMounts:
    - name: secret-volume
      mountPath: "/etc/secrets"
      readOnly: true
    - name: tls-volume
      mountPath: "/etc/tls"
      readOnly: true
    command: ["/bin/sh"]
    args: ["-c", "while true; do ls -la /etc/secrets/; ls -la /etc/tls/; sleep 30; done"]
  volumes:
  - name: secret-volume
    secret:
      secretName: user-credentials
  - name: tls-volume
    secret:
      secretName: tls-secret
