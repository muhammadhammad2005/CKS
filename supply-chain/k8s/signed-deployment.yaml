apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-app
  template:
    metadata:
      labels:
        app: secure-app
    spec:
      containers:
      - name: secure-nginx
        image: hammad2005/secure-app:v1.0
        ports:
        - containerPort: 8080
        securityContext:
          runAsUser: 0       # run as root
          runAsGroup: 0
