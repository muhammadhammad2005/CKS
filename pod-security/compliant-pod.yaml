apiVersion: v1
kind: Pod
metadata:
  name: compliant-app
  namespace: baseline-test
spec:
  containers:
  - name: app
    image: nginx:1.21
    ports:
    - containerPort: 80
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      runAsUser: 1000
      capabilities:
        drop:
        - ALL
