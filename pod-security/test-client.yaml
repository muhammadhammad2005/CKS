apiVersion: v1
kind: Pod
metadata:
  name: test-client
  namespace: restricted-test
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: client
    image: busybox
    command: ["sh", "-c", "wget -qO- http://secure-web-service && sleep 3600"]
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
